kind = "web"
previewPath = "/"
title = "Smart Home Dashboard"
version = "1.0.0"
id = "artifacts/smart-home"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22449

[services.development]
run = "pnpm --filter @workspace/smart-home run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/smart-home", "run", "build" ]
publicDir = "artifacts/smart-home/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22449"
BASE_PATH = "/"
